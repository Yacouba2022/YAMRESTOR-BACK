spring.application.name=yamrestor

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/yamrestor
spring.datasource.username=postgres
spring.datasource.password=41503584
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
# Charge les collections @OneToMany (lignes) en lots pour eviter le N+1
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Server
server.port=8080

# Logs (fichier persistant pour le diagnostic)
logging.file.name=logs/app.log

# JWT
app.jwt.secret=YamRestor2024SuperSecretKeyChangeMeInProduction!!
app.jwt.expiration=86400000

# Securite : delai d'inactivite (minutes) avant deconnexion automatique cote front
app.security.inactivity-timeout-minutes=15

# CORS (motifs d'origines autorisees, separes par des virgules ; jokers * supportes)
# Couvre localhost + toutes les IP du LAN sur le port 4200 (acces multi-postes du POS).
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://192.168.*.*:4200,http://172.*.*.*:4200,http://10.*.*.*:4200

# Upload images
app.upload.produits.dir=uploads/produits/photos
app.upload.users.dir=uploads/users/photos
app.upload.restaurant.dir=uploads/restaurant
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
